<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tower Defense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:       #07060f;
      --bg-panel:      #0d0b1a;
      --bg-surface:    #15112b;
      --bg-inset:      #09071a;
      --accent:        #a855f7;
      --accent-dim:    rgba(168, 85, 247, 0.12);
      --accent-glow:   rgba(168, 85, 247, 0.30);
      --accent-border: rgba(168, 85, 247, 0.35);
      --amber:         #f0a028;
      --border:        rgba(255, 255, 255, 0.07);
      --text-primary:  #ede8f8;
      --text-secondary:#8878aa;
      --text-dim:      #4a3f6a;
      --font-ui:       'Rajdhani', sans-serif;
      --font-mono:     'Share Tech Mono', monospace;
      --radius-sm:     4px;
      --radius-md:     8px;
      --radius-lg:     12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      /* grid removed: linear-gradient on body forces full repaint every WebGL frame */
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 26px;
      height: 26px;
      border: 1.5px solid var(--accent);
      border-radius: var(--radius-sm);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-icon::before {
      content: '';
      position: absolute;
      inset: 4px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }

    .brand-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .brand-title em {
      font-style: normal;
      color: var(--accent);
    }

    .hdivider {
      width: 1px;
      height: 22px;
      background: var(--border);
    }

    /* Status */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 11px 4px 7px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }

    .status-dot.ready {
      background: var(--accent);
      box-shadow: 0 0 7px var(--accent);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--bg-surface);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Kill animation entirely when hidden — keeps it off the animation thread */
    .spinner[style*="none"] {
      animation: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-wrap {
      flex: 1;
      max-width: 180px;
    }

    progress {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
    }

    progress::-webkit-progress-bar  { background: var(--bg-surface); border-radius: 2px; }
    progress::-webkit-progress-value { background: var(--accent); border-radius: 2px; }
    progress[hidden] { display: none; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .ctrl-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }

    .ctrl-label:hover { color: var(--text-primary); background: var(--bg-surface); }

    .ctrl-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 12px;
      height: 12px;
      cursor: pointer;
    }

    .btn-fs {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-fs:hover {
      background: rgba(168, 85, 247, 0.22);
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .btn-fs::before { content: '⛶'; font-size: 13px; }

    .btn-restart {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: rgba(240, 160, 40, 0.10);
      border: 1px solid rgba(240, 160, 40, 0.30);
      border-radius: var(--radius-sm);
      color: var(--amber);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-restart:hover {
      background: rgba(240, 160, 40, 0.20);
      box-shadow: 0 0 14px rgba(240, 160, 40, 0.25);
    }

    .btn-restart::before { content: '↺'; font-size: 14px; font-weight: 400; }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      padding: 16px;
      gap: 14px;
      align-items: flex-start;
    }

    /* ── CANVAS PANEL ── */
    .canvas-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .panel-label::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border: 1px solid var(--text-dim);
      border-radius: 50%;
    }

    /* Timer */
    .timer-display {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px 9px;
      letter-spacing: 0.06em;
      transition: color 0.3s, border-color 0.3s;
    }

    .timer-display.running {
      color: var(--accent);
      border-color: var(--accent-border);
    }

    .timer-display.stopped {
      color: var(--amber);
      border-color: rgba(240, 160, 40, 0.35);
    }

    .timer-icon {
      font-size: 11px;
      opacity: 0.7;
    }

    /* Wrapper shrinks to fit the scaled canvas */
    .canvas-wrapper {
      display: inline-block;
      background: #000;
      border: 1px solid var(--border);
      /* isolate: prevents canvas repaints from triggering parent repaints */
      contain: layout paint;
      transition: border-color 0.3s;
    }

    .canvas-wrapper:hover,
    .canvas-wrapper:focus-within {
      border-color: var(--accent-border);
      /* no box-shadow: triggers paint layer flush — border-only is composite-only */
    }

    /* Dimensions set by fitCanvas() in JS after Emscripten loads */
    canvas.emscripten {
      display: block;
      background: #000;
      /* Own GPU compositing layer: canvas repaints don't affect DOM */
      will-change: transform;
      transform: translateZ(0);
      /* Preserve pixel art crispness when scaled down */
      image-rendering: pixelated;
      /* Prevent browser swipe/pinch gestures from capturing touch events */
      touch-action: none;
    }

    /* ── CONSOLE PANEL ── */
    .console-panel {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .console-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .console-label::before {
      content: '>';
      color: var(--accent);
      font-size: 12px;
      line-height: 1;
    }

    .console-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 3px;
      padding: 2px 7px;
    }

    .console-box {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .console-titlebar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 11px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-r { background: #e74c3c; }
    .dot-y { background: #f39c12; }
    .dot-g { background: #2ecc71; }

    .console-title-text {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-left: 5px;
    }

    #output {
      width: 100%;
      height: 440px;
      background: var(--bg-inset);
      color: #bf94f5;
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.75;
      border: none;
      outline: none;
      resize: none;
      padding: 12px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-surface) transparent;
    }

    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--bg-surface); border-radius: 2px; }

    /* ── FOOTER ── */
    footer {
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    .finfo {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .finfo em {
      font-style: normal;
      color: var(--text-secondary);
    }

    @media (max-width: 820px) {
      main {
        flex-direction: column;
        padding: 12px;
        gap: 12px;
      }
      .canvas-panel { width: 100%; }
      .console-panel { width: 100%; }
      #output { height: 200px; }
    }

    /* ── Mobile ── */
    @media (max-width: 540px) {
      /* Header wraps to two rows */
      header {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 14px;
      }

      /* Row 1: brand + status */
      .brand       { flex: 1; min-width: 0; }
      .status-badge { flex-shrink: 0; }
      .hdivider    { display: none; }
      .progress-wrap { order: 3; width: 100%; max-width: 100%; flex-basis: 100%; }

      /* Row 2: controls full width */
      .controls {
        order: 4;
        width: 100%;
        margin-left: 0;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 6px;
      }

      /* Bigger tap targets on mobile (min 44px) */
      .btn-fs, .btn-restart {
        padding: 9px 16px;
        font-size: 13px;
        min-height: 44px;
      }

      .ctrl-label {
        padding: 8px 10px;
        min-height: 44px;
      }

      /* Hide "Resize" checkbox — not useful on mobile */
      .ctrl-resize { display: none; }

      /* Canvas area */
      main { padding: 10px; gap: 10px; }

      .panel-topbar { margin-bottom: 2px; }

      /* Timer smaller */
      .timer-display { font-size: 11px; padding: 3px 7px; }

      /* Console shorter to leave room for canvas */
      #output { height: 150px; font-size: 11px; }

      /* Footer: single line, condensed */
      footer { padding: 6px 14px; }
      .finfo:first-child { display: none; } /* hide "Emscripten/WebGL" on tiny screens */
    }

    /* Landscape mobile: side by side again but compact */
    @media (max-width: 820px) and (orientation: landscape) and (max-height: 500px) {
      main { flex-direction: row; align-items: flex-start; }
      .console-panel { width: 220px; flex-shrink: 0; }
      #output { height: calc(100vh - 120px); }
    }
  </style>
</head>
<body>

  <header>
    <div class="hdivider"></div>

    <div class="status-badge">
      <div class="spinner" id="spinner"></div>
      <div class="status-dot" id="status-dot"></div>
      <span id="status">Downloading...</span>
    </div>

    <div class="progress-wrap">
      <progress value="0" max="100" id="progress" hidden></progress>
    </div>

    <div class="controls">
      <label class="ctrl-label ctrl-resize">
        <input type="checkbox" id="resize"> Resize
      </label>
      <label class="ctrl-label">
        <input type="checkbox" id="pointerLock" checked> Lock cursor
      </label>
      <button class="btn-restart" onclick="location.reload()">Restart</button>
      <button class="btn-fs"
        onclick="Module.requestFullscreen(
          document.getElementById('pointerLock').checked,
          document.getElementById('resize').checked
        )">Fullscreen</button>
    </div>
  </header>

  <main>
    <div class="canvas-panel">
      <div class="panel-topbar">
        <div class="panel-label">viewport</div>
        <div class="timer-display" id="timer">
          <span class="timer-icon">◷</span>
          <span id="timer-value">00:00</span>
        </div>
      </div>
      <div class="canvas-wrapper">
        <canvas class="emscripten" id="canvas"
          oncontextmenu="event.preventDefault()"
          tabindex="-1"></canvas>
      </div>
    </div>

    <div class="console-panel">
      <div class="console-header">
        <div class="console-label">stdout</div>
        <div class="console-badge" id="log-count">0 lines</div>
      </div>
      <div class="console-box">
        <div class="console-titlebar">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
          <span class="console-title-text">game.log — output</span>
        </div>
        <textarea id="output" rows="8" spellcheck="false" readonly></textarea>
      </div>
    </div>
  </main>

  <footer>
    <span class="finfo">Emscripten / WebAssembly — <em>WebGL</em></span>
    <span class="finfo" id="footer-status">Initializing...</span>
  </footer>

<script>
  var statusElement   = document.getElementById('status');
  var statusDot       = document.getElementById('status-dot');
  var progressElement = document.getElementById('progress');
  var spinnerElement  = document.getElementById('spinner');
  var canvasElement   = document.getElementById('canvas');
  var outputElement   = document.getElementById('output');
  var logCountEl      = document.getElementById('log-count');
  var footerStatus    = document.getElementById('footer-status');
  var timerEl         = document.getElementById('timer');
  var timerValueEl    = document.getElementById('timer-value');
  var logLines        = 0;

  /* ── Canvas auto-fit ── */
  function fitCanvas() {
    var nW = canvasElement.width;
    var nH = canvasElement.height;
    if (!nW || !nH) return;

    var panel  = canvasElement.closest('.canvas-panel');
    var maxW   = panel ? panel.clientWidth : window.innerWidth * 0.95;
    var isMobile = window.innerWidth <= 820;
    var maxH   = window.innerHeight * (isMobile ? 0.52 : 0.70);

    var scale  = Math.min(maxW / nW, maxH / nH);
    if (scale > 1) scale = 1;

    canvasElement.style.width  = Math.round(nW * scale) + 'px';
    canvasElement.style.height = Math.round(nH * scale) + 'px';
  }

  window.addEventListener('resize', fitCanvas);
  var timerStart    = null;
  var timerInterval = null;
  var timerStopped  = false;

  function formatTime(ms) {
    var total = Math.floor(ms / 1000);
    var m = Math.floor(total / 60);
    var s = total % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function startTimer() {
    if (timerInterval) return;
    timerStart = Date.now();
    timerEl.classList.add('running');
    timerInterval = setInterval(() => {
      timerValueEl.textContent = formatTime(Date.now() - timerStart);
    }, 500);
  }

  function stopTimer() {
    if (!timerInterval) return;
    clearInterval(timerInterval);
    timerInterval = null;
    timerStopped = true;
    timerEl.classList.remove('running');
    timerEl.classList.add('stopped');
  }

  /* ── Batched console output avec limite de lignes ── */
  var MAX_LINES             = 150; // Ajuste cette valeur si besoin
  var consoleLines          = [];  
  var outputBuffer          = [];
  var outputFlushScheduled  = false;

  if (outputElement) outputElement.value = '';

  function flushOutput() {
    if (outputBuffer.length === 0) { outputFlushScheduled = false; return; }
    
    // Ajoute les nouvelles lignes à l'historique
    consoleLines.push(...outputBuffer);
    outputBuffer = [];

    // Tronque l'historique si on dépasse la limite
    if (consoleLines.length > MAX_LINES) {
      consoleLines = consoleLines.slice(consoleLines.length - MAX_LINES);
    }

    // Met à jour le texte du DOM avec l'historique nettoyé
    outputElement.value = consoleLines.join('');
    outputElement.scrollTop = outputElement.scrollHeight;
    logCountEl.textContent  = logLines + (logLines === 1 ? ' line' : ' lines');
    outputFlushScheduled = false;
  }

  if (canvasElement) {
    canvasElement.addEventListener('webglcontextlost', (e) => {
      alert('WebGL context lost. You will need to reload the page.');
      e.preventDefault();
    }, false);

    canvasElement.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
    canvasElement.addEventListener('touchmove',  (e) => e.preventDefault(), { passive: false });
  }

  var setStatus = (text) => {
    if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
    if (text === setStatus.last.text) return;
    var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
    var now = Date.now();
    if (m && now - setStatus.last.time < 30) return;
    setStatus.last.time = now;
    setStatus.last.text = text;
    if (m) {
      text = m[1];
      progressElement.value  = parseInt(m[2]) * 100;
      progressElement.max    = parseInt(m[4]) * 100;
      progressElement.hidden = false;
      spinnerElement.style.display = '';
    } else {
      progressElement.value  = null;
      progressElement.max    = null;
      progressElement.hidden = true;
      if (!text) {
        spinnerElement.style.display = 'none';
        statusDot.classList.add('ready');
        footerStatus.innerHTML = '<em>Ready</em>';
        startTimer();
      }
    }
    statusElement.textContent = text;
    footerStatus.textContent  = text || 'Ready';
  };

  var isMobileOptimized = window.innerWidth <= 820;

  var Module = {
    webglContextAttributes: {
      alpha: false,
      antialias: false,
      depth: false,
      powerPreference: "high-performance"
    },

    print(...args) {
      console.log(...args);
      if (outputElement && !isMobileOptimized) {
        logLines++;
        outputBuffer.push(args.join(' ') + '\n');
        if (!outputFlushScheduled) {
          outputFlushScheduled = true;
          requestAnimationFrame(flushOutput);
        }
      }
    },
    printErr(...args) {
      console.error(...args);
    },
    canvas: canvasElement,
    setStatus,
    totalDependencies: 0,
    monitorRunDependencies(left) {
      this.totalDependencies = Math.max(this.totalDependencies, left);
      setStatus(left
        ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
        : 'All downloads complete.'
      );
      if (left === 0) setTimeout(fitCanvas, 200);
    }
  };

  setStatus('Downloading...');

  window.onerror = () => {
    setStatus('Exception thrown, see JavaScript console');
    spinnerElement.style.display = 'none';
    statusDot.style.background = '#e74c3c';
    stopTimer();
    setStatus = (t) => { if (t) console.error('[post-exception] ' + t); };
  };
</script>
<script async src="index.js"></script>

</body>
</html>
